; PlatformIO project for the CrowPanel 7.0" HMI ESP32-S3-N4R8 (Elecrow).
; - 800x480 RGB parallel panel (no controller, direct DPI)
; - GT911 capacitive touch over I2C
; - 8MB octal PSRAM, 4MB flash
;
; Toolchain pulls in: Arduino_GFX, TAMC_GT911, LVGL 8.4, ArduinoJson.
[env:crowpanel-7]
; pioarduino fork ships Arduino-ESP32 v3 / IDF v5, required by Arduino_GFX
; >=1.6.x for the bounce-buffer fix that eliminates RGB-panel tearing.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 460800
monitor_port = /dev/cu.wchusbserial10
upload_port = /dev/cu.wchusbserial110
monitor_filters = esp32_exception_decoder

; N4R8 = 4MB flash, 8MB OCTAL PSRAM
board_build.flash_size = 4MB
board_build.psram_type = opi
board_upload.flash_size = 4MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = min_spiffs.csv

build_flags =
    ; Serial -> UART0 (CH343 chip on the CrowPanel). Do NOT enable USB CDC,
    ; the board's USB-C is wired to the CH343, not to the S3's native USB.
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    ; LVGL config — point lv_conf.h next to this project root
    -I include
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    ; Larger stack for HTTP + image decode
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=16384
    ; ElegantOTA: use blocking WebServer, not AsyncWebServer
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=0

lib_deps =
    lvgl/lvgl @ 9.5.0
    moononournation/GFX Library for Arduino @ 1.6.5
    tamctec/TAMC_GT911 @ 1.0.2
    bblanchon/ArduinoJson @ 7.4.3
    greiman/SdFat @ 2.2.3
    ayushsharma82/ElegantOTA @ 3.1.7

; Don't pick up unrelated globally-installed libraries (e.g. RPAsyncTCP).
lib_ldf_mode = chain
lib_compat_mode = strict
lib_extra_dirs =

build_unflags = -std=gnu++11
build_src_flags = -std=gnu++17
